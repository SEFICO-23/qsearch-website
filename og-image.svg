<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0d18"/>
      <stop offset="100%" stop-color="#16132a"/>
    </linearGradient>
    <linearGradient id="qg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B23FF"/>
      <stop offset="100%" stop-color="#008BFF"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B23FF"/>
      <stop offset="50%" stop-color="#008BFF"/>
      <stop offset="100%" stop-color="#E4FF30"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Gradient accent line -->
  <rect x="80" y="280" width="400" height="3" rx="1.5" fill="url(#line)"/>
  <!-- Logo -->
  <rect x="80" y="80" width="64" height="64" rx="14" fill="url(#qg)"/>
  <text x="112" y="120" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="38" fill="#E4FF30">Q</text>
  <!-- Brand name -->
  <text x="160" y="114" font-family="sans-serif" font-weight="800" font-size="22" fill="#eeedf5" letter-spacing="-0.5">QuantumSearch</text>
  <text x="160" y="138" font-family="sans-serif" font-weight="400" font-size="13" fill="#7a7490">Security Research</text>
  <!-- Headline -->
  <text x="80" y="340" font-family="sans-serif" font-weight="800" font-size="52" fill="#eeedf5" letter-spacing="-1.5">Swiss Offensive Security</text>
  <!-- Subline -->
  <text x="80" y="395" font-family="sans-serif" font-weight="400" font-size="22" fill="#a8a4be">We find what attackers find. Before they do.</text>
  <!-- URL -->
  <text x="80" y="560" font-family="monospace" font-weight="500" font-size="16" fill="#008BFF">qsearch.ch</text>
  <!-- Switzerland -->
  <text x="210" y="560" font-family="monospace" font-weight="400" font-size="16" fill="#7a7490">Switzerland</text>
</svg>
